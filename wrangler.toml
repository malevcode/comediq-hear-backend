name = "comediq-hear"
main = "src/index.js"
compatibility_date = "2024-09-23"

# ── D1 (relational data) ─────────────────────────────────────────────────────
# After creating: wrangler d1 create comediq
# Paste the database_id from that output here.
[[d1_databases]]
binding = "DB"
database_name = "comediq"
database_id = "26491d4a-8229-48b6-a4d3-73ea96c4ee9f"

# ── R2 (object storage) ──────────────────────────────────────────────────────
# After creating: wrangler r2 bucket create comediq-media
[[r2_buckets]]
binding = "R2"
bucket_name = "comediq-media"

# ── Durable Objects ──────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name = "PROCESSING_JOB"
class_name = "ProcessingJob"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ProcessingJob"]

# ── Variables ─────────────────────────────────────────────────────────────────
[vars]
FRONTEND_URL = "http://localhost:8081"
# Override for production:
#   wrangler deploy --var FRONTEND_URL:https://comediq.com

# ── Secrets (set via: wrangler secret put <NAME>) ────────────────────────────
# ASSEMBLYAI_KEY
# ANTHROPIC_KEY
# GOOGLE_CLIENT_ID      ← register at console.cloud.google.com
# GOOGLE_CLIENT_SECRET  ← callback URI: https://<worker>/auth/google/callback
